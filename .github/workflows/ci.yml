name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [broker, policy-engine, safety-monitor, memory-layer, model-runtime]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.component }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.component }}-${{ hashFiles(format('{0}/Cargo.toml', matrix.component)) }}

      - name: Check formatting
        working-directory: ${{ matrix.component }}
        run: cargo fmt --check

      - name: Clippy lints
        working-directory: ${{ matrix.component }}
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ${{ matrix.component }}
        run: cargo test

  schema-validation:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tool schemas (JSON syntax)
        run: |
          for f in schemas/tools/*.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))"
          done

      - name: Validate policy schema (JSON syntax)
        run: python3 -c "import json; json.load(open('schemas/policies/policy-schema.json'))"

      - name: Validate default policy (YAML syntax)
        run: python3 -c "import yaml; yaml.safe_load(open('schemas/policies/default-policy.yaml'))" || pip3 install pyyaml && python3 -c "import yaml; yaml.safe_load(open('schemas/policies/default-policy.yaml'))"
